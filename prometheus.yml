global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: up-espaco-backend
    metrics_path: /metrics
    static_configs:
      - targets:
          - backend:8000

  - job_name: up-espaco-postgres
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: up-espaco-containers
    static_configs:
      - targets:
          - cadvisor:8080
