services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: up_espaco
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend-up/internal/adapters/database/migrations:/migrations
    ports:
      - '127.0.0.1:5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend-up
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_PORT: 8000
      DATABASE_URL: postgres://postgres:postgres@db:5432/up_espaco?sslmode=disable
      JWT_SECRET: up-espaco-dev-secret-change-me
      CORS_ORIGIN: 'http://localhost:5173,http://127.0.0.1:5173'
    ports:
      - '127.0.0.1:8000:8000'
    volumes:
      - ./backend-up/docs:/app/docs
    command: ['/app/backend']

  frontend:
    build:
      context: ./frontend-up
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - '127.0.0.1:5173:5173'
    volumes:
      - ./frontend-up:/app
      - /app/node_modules

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATA_SOURCE_NAME: postgresql://postgres:postgres@db:5432/up_espaco?sslmode=disable
    ports:
      - '127.0.0.1:9187:9187'

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    ports:
      - '127.0.0.1:8080:8080'

  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    depends_on:
      - backend
      - postgres-exporter
      - cadvisor
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - '127.0.0.1:9090:9090'

  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports:
      - '127.0.0.1:3000:3000'

volumes:
  db_data:
  prometheus_data:
  grafana_data:
